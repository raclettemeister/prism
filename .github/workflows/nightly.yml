name: PRISM Nightly Briefing

on:
  # Run every night at 3:00 UTC (4:00 AM CET)
  schedule:
    - cron: '0 3 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-prism:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy news interests from MylifeOS
        run: |
          mkdir -p data
          if [ -n "$MYLIFEOS_PAT" ] && [ -n "$MYLIFEOS_REPO" ]; then
            curl -sf -H "Authorization: token $MYLIFEOS_PAT" \
              "https://raw.githubusercontent.com/$MYLIFEOS_REPO/main/Projects/Software/Research%20Center/NEWS-INTERESTS.md" \
              -o data/news-interests.md || echo "⚠️ Could not fetch news interests — using existing"
          else
            echo "⚠️ No MylifeOS credentials — using existing news interests file"
          fi
        env:
          MYLIFEOS_PAT: ${{ secrets.MYLIFEOS_PAT }}
          MYLIFEOS_REPO: ${{ secrets.MYLIFEOS_REPO }}

      - name: Run PRISM
        run: node src/index.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MYLIFEOS_REPO: ${{ secrets.MYLIFEOS_REPO }}
          MYLIFEOS_PAT: ${{ secrets.MYLIFEOS_PAT }}

      - name: Commit briefing and data
        run: |
          git config user.name "PRISM Bot"
          git config user.email "prism@noreply.github.com"
          git add briefings/ data/
          git diff --staged --quiet || git commit -m "📡 PRISM v5.0 briefing $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
